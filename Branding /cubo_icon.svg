<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9933ff"/><stop offset="100%" stop-color="#6600cc"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7700dd"/><stop offset="100%" stop-color="#4400aa"/>
    </linearGradient>
    <linearGradient id="g3" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#aa44ff"/><stop offset="100%" stop-color="#7722cc"/>
    </linearGradient>
  </defs>
  <g transform="translate(60,42)">
    <!-- Top face tiles (3x3 diamond grid) -->
    <polygon points="-10,-22 10,-32 30,-22 10,-12" fill="url(#g1)"/>
    <polygon points="10,-32 30,-42 50,-32 30,-22" fill="url(#g1)" opacity=".9"/>
    <polygon points="-30,-12 -10,-22 10,-12 -10,-2" fill="url(#g1)" opacity=".85"/>
    <polygon points="-10,-22 10,-32 30,-22 10,-12" fill="url(#g1)" opacity=".75"/>
    <!-- Left face tiles (3 rows) -->
    <g transform="skewY(30)">
      <rect x="-32" y="-12" width="20" height="20" rx="3" fill="url(#g2)"/>
      <rect x="-32" y="10" width="20" height="20" rx="3" fill="url(#g2)" opacity=".8"/>
      <rect x="-32" y="32" width="20" height="20" rx="3" fill="url(#g2)" opacity=".6"/>
      <rect x="-10" y="-12" width="20" height="20" rx="3" fill="url(#g2)" opacity=".9"/>
      <rect x="-10" y="10" width="20" height="20" rx="3" fill="url(#g2)" opacity=".7"/>
      <rect x="-10" y="32" width="20" height="20" rx="3" fill="url(#g2)" opacity=".5"/>
    </g>
    <!-- Right face tiles (3 rows) -->
    <g transform="skewY(-30)">
      <rect x="14" y="-12" width="20" height="20" rx="3" fill="url(#g3)"/>
      <rect x="14" y="10" width="20" height="20" rx="3" fill="url(#g3)" opacity=".8"/>
      <rect x="14" y="32" width="20" height="20" rx="3" fill="url(#g3)" opacity=".6"/>
      <rect x="36" y="-12" width="20" height="20" rx="3" fill="url(#g3)" opacity=".9"/>
      <rect x="36" y="10" width="20" height="20" rx="3" fill="url(#g3)" opacity=".7"/>
      <rect x="36" y="32" width="20" height="20" rx="3" fill="url(#g3)" opacity=".5"/>
    </g>
  </g>
</svg>
