<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- CUBO FRM Rainbow Gradient -->
    <linearGradient id="frmGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff0080"/>
      <stop offset="40%" stop-color="#8000ff"/>
      <stop offset="70%" stop-color="#0080ff"/>
      <stop offset="100%" stop-color="#00ff00"/>
    </linearGradient>
    <!-- Cube face gradients -->
    <linearGradient id="faceTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8000ff"/>
      <stop offset="100%" stop-color="#5500cc"/>
    </linearGradient>
    <linearGradient id="faceLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6600dd"/>
      <stop offset="100%" stop-color="#4400aa"/>
    </linearGradient>
    <linearGradient id="faceRight" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9933ff"/>
      <stop offset="100%" stop-color="#6600cc"/>
    </linearGradient>
    <!-- Tile highlight -->
    <linearGradient id="tileShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- ========== 3D CUBE (9 tiles per visible face) ========== -->
  <g transform="translate(256, 190)">
    <!-- TOP FACE (isometric) -->
    <g>
      <!-- Row 1 -->
      <path d="M-90,-90 L-30,-120 L30,-90 L-30,-60 Z" fill="url(#faceTop)" rx="4"/>
      <path d="M-30,-120 L30,-150 L90,-120 L30,-90 Z" fill="url(#faceTop)"/>
      <path d="M30,-150 L90,-180 L150,-150 L90,-120 Z" fill="url(#faceTop)"/>
      <!-- Row 2 -->
      <path d="M-150,-60 L-90,-90 L-30,-60 L-90,-30 Z" fill="url(#faceTop)"/>
      <path d="M-90,-90 L-30,-120 L30,-90 L-30,-60 Z" fill="url(#faceTop)" opacity="0.85"/>
      <path d="M-30,-120 L30,-150 L90,-120 L30,-90 Z" fill="url(#faceTop)" opacity="0.85"/>
      <!-- Row 3 -->
      <path d="M-210,-30 L-150,-60 L-90,-30 L-150,0 Z" fill="url(#faceTop)" opacity="0.7"/>
      <path d="M-150,-60 L-90,-90 L-30,-60 L-90,-30 Z" fill="url(#faceTop)" opacity="0.7"/>
      <path d="M-90,-90 L-30,-120 L30,-90 L-30,-60 Z" fill="url(#faceTop)" opacity="0.65"/>
    </g>

    <!-- LEFT FACE -->
    <g>
      <!-- Col 1 -->
      <rect x="-152" y="2" width="58" height="58" rx="6" fill="url(#faceLeft)" transform="skewY(30) translate(0, -30)"/>
      <rect x="-152" y="65" width="58" height="58" rx="6" fill="url(#faceLeft)" transform="skewY(30) translate(0, -30)" opacity="0.85"/>
      <rect x="-152" y="128" width="58" height="58" rx="6" fill="url(#faceLeft)" transform="skewY(30) translate(0, -30)" opacity="0.7"/>
      <!-- Col 2 -->
      <rect x="-89" y="2" width="58" height="58" rx="6" fill="url(#faceLeft)" transform="skewY(30) translate(0, -30)" opacity="0.9"/>
      <rect x="-89" y="65" width="58" height="58" rx="6" fill="url(#faceLeft)" transform="skewY(30) translate(0, -30)" opacity="0.75"/>
      <rect x="-89" y="128" width="58" height="58" rx="6" fill="url(#faceLeft)" transform="skewY(30) translate(0, -30)" opacity="0.6"/>
      <!-- Col 3 -->
      <rect x="-26" y="2" width="58" height="58" rx="6" fill="url(#faceLeft)" transform="skewY(30) translate(0, -30)" opacity="0.8"/>
      <rect x="-26" y="65" width="58" height="58" rx="6" fill="url(#faceLeft)" transform="skewY(30) translate(0, -30)" opacity="0.65"/>
      <rect x="-26" y="128" width="58" height="58" rx="6" fill="url(#faceLeft)" transform="skewY(30) translate(0, -30)" opacity="0.5"/>
    </g>

    <!-- RIGHT FACE -->
    <g>
      <!-- Col 1 -->
      <rect x="38" y="2" width="58" height="58" rx="6" fill="url(#faceRight)" transform="skewY(-30) translate(0, -30)"/>
      <rect x="38" y="65" width="58" height="58" rx="6" fill="url(#faceRight)" transform="skewY(-30) translate(0, -30)" opacity="0.85"/>
      <rect x="38" y="128" width="58" height="58" rx="6" fill="url(#faceRight)" transform="skewY(-30) translate(0, -30)" opacity="0.7"/>
      <!-- Col 2 -->
      <rect x="101" y="2" width="58" height="58" rx="6" fill="url(#faceRight)" transform="skewY(-30) translate(0, -30)" opacity="0.9"/>
      <rect x="101" y="65" width="58" height="58" rx="6" fill="url(#faceRight)" transform="skewY(-30) translate(0, -30)" opacity="0.75"/>
      <rect x="101" y="128" width="58" height="58" rx="6" fill="url(#faceRight)" transform="skewY(-30) translate(0, -30)" opacity="0.6"/>
      <!-- Col 3 -->
      <rect x="164" y="2" width="58" height="58" rx="6" fill="url(#faceRight)" transform="skewY(-30) translate(0, -30)" opacity="0.8"/>
      <rect x="164" y="65" width="58" height="58" rx="6" fill="url(#faceRight)" transform="skewY(-30) translate(0, -30)" opacity="0.65"/>
      <rect x="164" y="128" width="58" height="58" rx="6" fill="url(#faceRight)" transform="skewY(-30) translate(0, -30)" opacity="0.5"/>
    </g>
  </g>

  <!-- ========== "FRM" Badge (like the orange iQ but in rainbow gradient) ========== -->
  <g transform="translate(370, 100)">
    <!-- Badge background -->
    <rect x="0" y="0" width="110" height="55" rx="12" fill="url(#frmGrad)"/>
    <!-- FRM text -->
    <text x="55" y="39" text-anchor="middle" font-family="'Space Grotesk', 'Inter', sans-serif" font-weight="900" font-size="32" fill="#ffffff" letter-spacing="2">FRM</text>
  </g>

  <!-- ========== CUBO wordmark ========== -->
  <text x="256" y="440" text-anchor="middle" font-family="'Space Grotesk', 'Inter', sans-serif" font-weight="800" font-size="64" fill="url(#frmGrad)" letter-spacing="8">CUBO</text>
  <text x="256" y="475" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="400" font-size="16" fill="#9ca3af" letter-spacing="6">FAN RELATIONSHIP MANAGEMENT</text>
</svg>
